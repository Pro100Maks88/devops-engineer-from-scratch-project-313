version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      #- PORT=80
      - DATABASE_URL=postgresql://user:password@db:5432/mydb  
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
